<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wearly</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-DQvkBjpPgn7RC31MCQoOeC9TI2kdqa4+BSgNMNj8v77fdC77Kj5zpWFTJaaAoMbC"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YUe2LzesAfftltw+PEaao2tjU/QATaW/rOitAq67e0CT0Zi2VVRL0oC4+gAaeBKu"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
    />
    <!-- Bootstrap Icons -->
    <style>
      .navbar {
        display: flex;
        width: 90%;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
        background-color: transparent;
        border: 0;
      }
      .navbar .search {
        display: flex;
        min-width: 300px; /* Set a minimum width */
        max-width: 100px; /* Set a maximum width */
      }
      body {
        background-image: url('./photos/kids/a42892d4af7a7d3d7073f2e43cb15c9d.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        position: relative;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        width: 100%;
        background-color: rgba(
          255,
          255,
          255,
          0.6
        ); /* or rgba(0, 0, 0, 0.4) for darker overlay */
        z-index: -1; /* Keep it behind everything */
      }
      .card {
        background-color: rgba(255, 255, 255, 0.058); /* or 0.6 */
        backdrop-filter: blur(5px); /* optional glass effect */
        }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar">
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <!-- Logo and Brand Name -->
          <a class="navbar-brand d-flex align-items-center" href="index.html">
            <img
              src="./photos/home photos/image.png"
              alt="Wearly Logo"
              height="100"
              class="rounded-circle me-2"
            />
            <span class="fs-4">Wearly</span>
          </a>
          <!-- Navbar Toggler for Mobile -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <!-- Navbar Links -->
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link active" href="index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="men.html">Men</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="women.html">Women</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="kids.html">Kids & Baby</a>
              </li>
              <!-- Dropdown for More Categories -->
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  Categories
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">Accessories</a></li>
                  <li><a class="dropdown-item" href="#">New Arrivals</a></li>
                  <li><hr class="dropdown-divider" /></li>
                  <li><a class="dropdown-item" href="#">Sale</a></li>
                </ul>
              </li>
            </ul>
            <!-- Search Bar, Cart & Login -->
            <div class="d-flex align-items-center ms-auto">
              <!-- Search Bar -->
              <form class="d-flex me-3 search" role="search">
                <input
                  class="form-control me-2"
                  type="search"
                  placeholder="Search"
                  aria-label="Search"
                />
              </form>
              <!-- Login (Icon + Button) -->
              <a
                href="login.html"
                class="d-flex align-items-center text-dark text-decoration-none"
              >
                <i class="bi bi-person fs-4 me-2"></i>
                <span class="btn btn-transparent">Login</span>
              </a>
              <!-- Wishlist Icon -->
              <a href="wishlist.html" class="me-3 text-dark">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="currentColor"
                  class="bi bi-heart"
                  viewBox="0 0 16 16"
                >
                  <path
                    d="m8 2.748-.717-.737C5.6.281 2.514.878 1.4 3.053c-.523 1.023-.641 2.5.314 4.385.92 1.815 2.834 3.989 6.286 6.357 3.452-2.368 5.365-4.542 6.286-6.357.955-1.886.838-3.362.314-4.385C13.486.878 10.4.28 8.717 2.01zM8 15C-7.333 4.868 3.279-3.04 7.824 1.143q.09.083.176.171a3 3 0 0 1 .176-.17C12.72-3.042 23.333 4.867 8 15"
                  />
                </svg>
              </a>
              <!-- Shopping Bag Icon -->
              <a href="cart.html" class="me-3 text-dark">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="currentColor"
                  class="bi bi-bag"
                  viewBox="0 0 16 16"
                >
                  <path
                    d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1m3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4zM2 5h12v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"
                  />
                </svg>
              </a>
            </div>
          </div>
        </div>
      </nav>
    </div>
    <!--login-->
<!-- Replace the container div with this: -->
<div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm my-5">
          <div class="card-body p-4">
            <h2 class="mb-4 text-center">Create Your Account</h2>
            <form class="needs-validation" novalidate>
              <!-- Basic Info -->
              <div class="mb-4">
                <h5 class="mb-3">Basic Information</h5>
                <div class="row g-3">
                  <div class="col-sm-6">
                    <label for="firstName" class="form-label">First name*</label>
                    <input type="text" class="form-control" id="firstName" required>
                  </div>
                  <div class="col-sm-6">
                    <label for="lastName" class="form-label">Last name*</label>
                    <input type="text" class="form-control" id="lastName" required>
                  </div>
                  <div class="col-12">
                    <label for="email" class="form-label">Email*</label>
                    <input type="email" class="form-control" id="email" required>
                  </div>
                  <div class="col-12">
                    <label for="password" class="form-label">Password*</label>
                    <input type="password" class="form-control" id="password" required>
                  </div>
                </div>
              </div>
              
              <!-- Optional Info (initially hidden) -->
              <div class="mb-4">
                <a href="#moreInfo" data-bs-toggle="collapse" class="d-block mb-3">
                  <h5 class="d-inline-block">Additional Information (Optional)</h5>
                  <i class="bi bi-chevron-down ms-2"></i>
                </a>
                <div id="moreInfo" class="collapse">
                  <!-- Rest of your form fields here -->
                </div>
              </div>
              
              <button class="w-100 btn btn-primary btn-lg" type="submit">
                Create Account
              </button>
            </form>
            
            <div class="mt-3 text-center">
              <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
  </body>
</html>
